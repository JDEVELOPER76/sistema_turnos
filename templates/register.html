<!-- register.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <!-- Ruta a tu CSS estático -->
    <link rel="stylesheet" href="/static/styles/login.css">
</head>
<body>
    <main class="login-wrapper">
        <div class="login-card">
            <h2 class="login-title">Crear cuenta</h2>
            
            <form action="/register" method="POST" class="login-form">
                <div class="input-group">
                    <label for="username">Usuario o correo</label>
                    <input type="text" id="username" name="username" placeholder="ejemplo@correo.com" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="Repite tu contraseña" required minlength="8" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>

            <div class="guest-section">
                <span class="divider">o</span>
                <a href="/login" class="btn btn-secondary">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </div>
    </main>
</body>
</html>
