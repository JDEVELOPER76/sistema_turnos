<!-- login.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <!-- Conexión con la hoja de estilos -->
    <link rel="stylesheet" href="/static/styles/login.css">
</head>
<body>
    <main class="login-wrapper">
        <div class="login-card">
            <h2 class="login-title">Bienvenido</h2>

            
            <form action="/login" method="POST" class="login-form">
                <div class="input-group">
                    <label for="username">Usuario o correo</label>
                    <input type="text" id="username" name="username" placeholder="ejemplo@correo.com" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="contraseña" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                {% if mensaje %}
                    <p class="{{ 'mensaje-exito' if exito else 'mensaje-error' }}">{{ mensaje }}</p>
                {% endif %}
            </form>

            <div style="display: flex; gap: 10px; width: 100%; margin-top: 20px;">
                <form action="/register" method="GET" style="flex: 1;">
                    <button type="submit" class="btn btn-secondary" style="width: 100%;">Registrar</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
