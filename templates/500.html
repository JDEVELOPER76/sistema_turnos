<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Error Interno del Servidor</title>
    <style>
        :root {
            --error-color: #ef4444;
            --error-accent: #f97316;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            z-index: 1;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 800;
            margin: 0;
            line-height: 1;
            background: linear-gradient(135deg, var(--error-color), var(--error-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 10px rgba(239, 68, 68, 0.2));
            animation: glitch 1s linear infinite;
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 1rem;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-block;
            padding: 14px 36px;
            background-color: var(--text-main);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            background-color: #000;
        }

        /* Animación sutil de "glitch" o parpadeo para el 500 */
        @keyframes glitch {
            0% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0.8; transform: skewX(1deg); }
            97% { opacity: 1; transform: skewX(0deg); }
            98% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        /* Engranajes decorativos de fondo */
        .gear {
            position: absolute;
            z-index: -1;
            fill: #e2e8f0;
            opacity: 0.6;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

    <div class="container">
        <p class="error-code">500</p>
        <h1>¡Ups! Algo salió mal</h1>
        <p>Nuestro servidor tuvo un problema inesperado. No te preocupes, ya estamos trabajando para arreglarlo.</p>
        <a href="/" class="btn-home">Intentar volver al inicio</a>
    </div>
</body>
</html>
